<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pages: Workflow Agents Quiz</title>

  <!-- Google Fonts: Newsreader · Instrument Sans · JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:opsz,wght@6..72,500;6..72,600;6..72,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <!--
    CUSTOMIZE PER QUIZ — change only the four accent variables below.
    Options:
      forest      #4D6A4F / #3D5540 / #E9F0EA / #95A794  (default)
      olive       #6A6A42 / #545434 / #F0F0E6 / #A9AA84
      copper      #99624A / #7B4F3D / #F6ECE7 / #C69884
      charcoal    #5C5148 / #4A413A / #F0EBE7 / #A89A8F
  -->
  <style>
    :root {
      --color-accent:       #5C5148;
      --color-accent-hover: #4A413A;
      --color-accent-light: #F0EBE7;
      --color-accent-muted: #A89A8F;
    }
  </style>

  <script src="main.js" defer></script>
</head>
<body>

  <nav class="nav" id="nav">
    <div class="progress-bar" id="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
    <div class="nav-inner">
      <div class="nav-brand">
        <span class="nav-title">Pages: Workflow Agents Quiz</span>
        <p class="nav-subtitle">Study the workflow-agent deck, answer instantly, and track understanding section by section.</p>
      </div>

      <div class="nav-meta">
        <div class="score-summary" aria-label="Overall score">
          <span class="score-pill score-pill-correct"><strong data-global-correct>0</strong> correct</span>
          <span class="score-pill score-pill-incorrect"><strong data-global-incorrect>0</strong> incorrect</span>
        </div>

        <div class="quiz-level-control" role="group" aria-label="Quiz difficulty">
          <span class="quiz-level-caption">Difficulty</span>
          <div class="quiz-level-switch">
            <button class="quiz-level-btn" data-quiz-level-btn="low" type="button" aria-pressed="false">Low</button>
            <button class="quiz-level-btn is-active" data-quiz-level-btn="medium" type="button" aria-pressed="true">Medium</button>
            <button class="quiz-level-btn" data-quiz-level-btn="deep" type="button" aria-pressed="false">Deep</button>
          </div>
        </div>

        <button class="btn global-reset-btn" type="button" onclick="resetAllQuizzes()">Reset All</button>

        <div class="nav-dots" id="nav-dots" role="tablist">
          <!--
            One <button> per section. Replace SECTION_N_NAME with the actual section title.

            <button class="nav-dot" data-target="section-1" data-tooltip="SECTION_1_NAME" role="tab" aria-label="Section 1: SECTION_1_NAME"></button>
            <button class="nav-dot" data-target="section-2" data-tooltip="SECTION_2_NAME" role="tab" aria-label="Section 2: SECTION_2_NAME"></button>
            ...
          -->
          <button class="nav-dot" data-target="section-1" data-tooltip="From Buzz to Business Need" role="tab" aria-label="Section 1: From Buzz to Business Need"></button>
          <button class="nav-dot" data-target="section-2" data-tooltip="Why the Monolith Stops Scaling" role="tab" aria-label="Section 2: Why the Monolith Stops Scaling"></button>
          <button class="nav-dot" data-target="section-3" data-tooltip="Workflow Agents as Modular Design" role="tab" aria-label="Section 3: Workflow Agents as Modular Design"></button>
          <button class="nav-dot" data-target="section-4" data-tooltip="Roles, Routing, and Graph Shape" role="tab" aria-label="Section 4: Roles, Routing, and Graph Shape"></button>
          <button class="nav-dot" data-target="section-5" data-tooltip="Shared State and Tool Decisions" role="tab" aria-label="Section 5: Shared State and Tool Decisions"></button>
        </div>
      </div>
    </div>
  </nav>

  <main id="main">
    <!-- sections/*.html content is assembled here by build.sh -->
