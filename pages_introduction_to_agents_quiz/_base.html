<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Introduction to Agents Quiz</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:opsz,wght@6..72,500;6..72,600;6..72,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --color-accent: #4D6A4F;
      --color-accent-hover: #3D5540;
      --color-accent-light: #E9F0EA;
      --color-accent-muted: #95A794;
    }
  </style>

  <script src="main.js" defer></script>
</head>
<body>

  <nav class="nav" id="nav">
    <div class="progress-bar" id="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
    <div class="nav-inner">
      <div class="nav-brand">
        <span class="nav-title">Introduction to Agents Quiz</span>
        <p class="nav-subtitle">Study the architecture, answer instantly, track your score.</p>
      </div>

      <div class="nav-meta">
        <div class="score-summary" aria-label="Overall score">
          <span class="score-pill score-pill-correct"><strong data-global-correct>0</strong> correct</span>
          <span class="score-pill score-pill-incorrect"><strong data-global-incorrect>0</strong> incorrect</span>
        </div>

        <div class="quiz-level-control" role="group" aria-label="Quiz difficulty">
          <span class="quiz-level-caption">Difficulty</span>
          <div class="quiz-level-switch">
            <button class="quiz-level-btn" data-quiz-level-btn="low" type="button" aria-pressed="false">Low</button>
            <button class="quiz-level-btn is-active" data-quiz-level-btn="medium" type="button" aria-pressed="true">Medium</button>
            <button class="quiz-level-btn" data-quiz-level-btn="deep" type="button" aria-pressed="false">Deep</button>
          </div>
        </div>

        <button class="btn global-reset-btn" type="button" onclick="resetAllQuizzes()">Reset All</button>

        <div class="nav-dots" id="nav-dots" role="tablist">
          <button class="nav-dot" data-target="section-1" data-tooltip="Why Agents Emerged" role="tab" aria-label="Section 1: Why Agents Emerged"></button>
          <button class="nav-dot" data-target="section-2" data-tooltip="Monolith Strengths and Limits" role="tab" aria-label="Section 2: Monolith Strengths and Limits"></button>
          <button class="nav-dot" data-target="section-3" data-tooltip="Workflow Agents as Modular Engineering" role="tab" aria-label="Section 3: Workflow Agents as Modular Engineering"></button>
          <button class="nav-dot" data-target="section-4" data-tooltip="Agent Roles and Workflow Topology" role="tab" aria-label="Section 4: Agent Roles and Workflow Topology"></button>
          <button class="nav-dot" data-target="section-5" data-tooltip="Shared State, Routing, and Tools" role="tab" aria-label="Section 5: Shared State, Routing, and Tools"></button>
        </div>
      </div>
    </div>
  </nav>

  <main id="main">
